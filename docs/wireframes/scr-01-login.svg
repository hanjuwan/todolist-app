<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .nav { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
      .card-shadow { fill: #000; opacity: 0.04; }
      .logo { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .navlink { font-size: 14px; fill: #475569; }
      .btn-outline { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .btn-outline-text { font-size: 13px; fill: #334155; }
      .title { font-size: 24px; font-weight: 700; fill: #0f172a; }
      .label { font-size: 13px; fill: #334155; font-weight: 500; }
      .input { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .input-placeholder { font-size: 14px; fill: #94a3b8; }
      .toggle { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .toggle-text { font-size: 12px; fill: #475569; }
      .error-box { fill: #fef2f2; stroke: #fecaca; stroke-width: 1; stroke-dasharray: 4 4; }
      .error-text { font-size: 12px; fill: #b91c1c; font-style: italic; }
      .primary-btn { fill: #3b82f6; }
      .primary-btn-text { font-size: 15px; font-weight: 600; fill: #ffffff; }
      .helper { font-size: 13px; fill: #64748b; }
      .link-btn { fill: #ffffff; stroke: #3b82f6; stroke-width: 1; }
      .link-btn-text { font-size: 14px; fill: #3b82f6; font-weight: 500; }
      .meta { font-size: 11px; fill: #94a3b8; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="800"/>

  <!-- Top Nav -->
  <rect class="nav" x="0" y="0" width="1280" height="64"/>
  <text class="logo" x="48" y="40">TodoListApp</text>
  <rect class="btn-outline" x="1060" y="18" width="80" height="32" rx="6"/>
  <text class="btn-outline-text" x="1100" y="38" text-anchor="middle">로그인</text>
  <rect class="btn-outline" x="1152" y="18" width="88" height="32" rx="6"/>
  <text class="btn-outline-text" x="1196" y="38" text-anchor="middle">회원가입</text>

  <!-- Login Card -->
  <rect class="card-shadow" x="402" y="170" width="476" height="500" rx="12"/>
  <rect class="card" x="400" y="168" width="476" height="500" rx="12"/>

  <text class="title" x="638" y="222" text-anchor="middle">로그인</text>

  <!-- Email -->
  <text class="label" x="440" y="280">이메일</text>
  <rect class="input" x="440" y="292" width="396" height="44" rx="6"/>
  <text class="input-placeholder" x="456" y="320">name@example.com</text>

  <!-- Password -->
  <text class="label" x="440" y="370">비밀번호</text>
  <rect class="input" x="440" y="382" width="320" height="44" rx="6"/>
  <text class="input-placeholder" x="456" y="410">••••••••</text>
  <rect class="toggle" x="768" y="382" width="68" height="44" rx="6"/>
  <text class="toggle-text" x="802" y="410" text-anchor="middle">보기</text>

  <!-- Error region (hidden state shown as dashed placeholder) -->
  <rect class="error-box" x="440" y="446" width="396" height="36" rx="6"/>
  <text class="error-text" x="638" y="470" text-anchor="middle">오류 메시지 영역 (기본 숨김)</text>

  <!-- Primary Button -->
  <rect class="primary-btn" x="440" y="500" width="396" height="48" rx="8"/>
  <text class="primary-btn-text" x="638" y="531" text-anchor="middle">로그인하기</text>

  <!-- Signup -->
  <text class="helper" x="638" y="588" text-anchor="middle">계정이 없으신가요?</text>
  <rect class="link-btn" x="500" y="606" width="276" height="40" rx="8"/>
  <text class="link-btn-text" x="638" y="632" text-anchor="middle">회원가입하기</text>

  <!-- Meta -->
  <text class="meta" x="640" y="720" text-anchor="middle">SCR-01 · UC-02 · FR-02 / FR-06 · Desktop ≥ 1024px</text>
  <text class="meta" x="640" y="738" text-anchor="middle">TodoListApp Wireframe v1.0 · 2026-05-13</text>
</svg>
